name: Deploy Frontend (Vercel)

# Manual only — Vercel already auto-deploys from GitHub. Avoids failed checks when secrets are not set.
on:
  workflow_dispatch:

jobs:
  deploy-credflow-portal:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Deploy CredFlow Portal (user + admin)
        uses: amondnet/vercel-action@v25
        with:
          vercel-token: ${{ secrets.VERCEL_TOKEN }}
          vercel-org-id: ${{ secrets.VERCEL_ORG_ID }}
          vercel-project-id: ${{ secrets.VERCEL_USER_PORTAL_PROJECT_ID }}
          working-directory: frontend/credflow-portal
          vercel-args: '--prod'
